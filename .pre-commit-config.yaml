# Pre-commit hooks. After cloning, run once: pre-commit install
# CI runs `pre-commit run --all-files`, so what you see locally is what CI checks.

# Auto-generated Alembic migration files are excluded across all hooks.
# Alembic's script.py.mako emits a trailing space on "Revises: " for the
# baseline migration (no down_revision), trailing-whitespace would fix it
# every CI run. Reviewed by hand at creation time. ruff has its own
# exclude in pyproject.toml so direct `ruff check` invocations skip them
# too.
exclude: ^steel_pigs/alembic/versions/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
