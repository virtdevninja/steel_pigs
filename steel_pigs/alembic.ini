# Alembic config for the bundled SQL inventory plugin.
# Both the SQL plugin (auto-upgrade at startup) and the
# `python -m steel_pigs.db` CLI build a Config object from this file via
# steel_pigs.db.make_alembic_config(), which sets script_location and
# sqlalchemy.url programmatically. The values below are sensible
# fallbacks for someone invoking `alembic` directly from the repo root.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url = sqlite:///steel_pigs.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
